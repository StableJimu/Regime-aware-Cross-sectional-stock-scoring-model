paths:
  project_root: "."
  raw_dir: "data/raw"
  panel_path: "data/raw/ohlcv_1d_panel.csv"
  market_index_path: "data/raw/market_index_panel.csv"
  universe_path: "data/raw/universe.csv"
  vix_path: "data/raw/vix.csv"
  sector_map_path: "data/raw/sector_map.csv"
  regime_hmm_path: "data/raw/market_regime_hmm.csv"
  factors_manifest: "data/factors/factors_manifest.json"
  rates_path: null
  factors_dir: "data/factors"
  model_dir: "data/model_params"
  backtest_dir: "data/backtest_split_frozen"

data:
  start_date: "2019-01-01"
  end_date: "2026-02-07"
  market_proxy_ticker: "SPY"

factors:
  batch_size: 50
  selected: [
    "alpha_001","alpha_002","alpha_003","alpha_004","alpha_005","alpha_006","alpha_007","alpha_008","alpha_009","alpha_010",
    "alpha_011","alpha_012","alpha_013","alpha_014","alpha_015","alpha_016","alpha_017","alpha_018","alpha_019","alpha_020",
    "alpha_021","alpha_022","alpha_023","alpha_024","alpha_025","alpha_026","alpha_027","alpha_028","alpha_029","alpha_030",
    "alpha_031","alpha_032","alpha_033","alpha_034","alpha_035","alpha_036","alpha_037","alpha_038","alpha_039","alpha_040",
    "alpha_041","alpha_042","alpha_043","alpha_044","alpha_045","alpha_046","alpha_047","alpha_048","alpha_049","alpha_050",
    "alpha_051","alpha_052","alpha_053","alpha_054","alpha_055","alpha_056","alpha_057","alpha_058","alpha_059","alpha_060",
    "alpha_061","alpha_062","alpha_063","alpha_064","alpha_065","alpha_066","alpha_067","alpha_068","alpha_069","alpha_070",
    "alpha_071","alpha_072","alpha_073","alpha_074","alpha_075","alpha_076","alpha_077","alpha_078","alpha_079","alpha_080",
    "alpha_081","alpha_082","alpha_083","alpha_084","alpha_085","alpha_086","alpha_087","alpha_088","alpha_089","alpha_090",
    "alpha_091","alpha_092","alpha_093","alpha_094","alpha_095","alpha_096","alpha_097","alpha_098","alpha_099","alpha_100",
    "alpha_101"
  ]

regime:
  k_states: 4
  feature_cols: [
    "mkt_ret_1d","mkt_ret_5d","mkt_ret_20d","mkt_mom_20_5",
    "mkt_abs_ret_1d","mkt_abs_ret_5d","mkt_neg_ret_1d","mkt_neg_ret_5d",
    "vix","vix_ret_5d","vix_z_20","vix_ratio_20",
    "y2","y2_chg_20d","term_spread","term_spread_chg_20d"
  ]
  emit_temp: 0.80
  var_floor: 0.60
  hard_prob: 0.97
  init_diag: 0.80
  prob_smooth_days: 5
  min_regime_duration: 5
  train_window_days: 756
  refit_freq_days: 21

model:
  max_factors_per_regime: 8
  label_horizon: 5
  model_family: "ridge"
  ridge_alpha: 1.0
  score_calibration: "bucketed"
  score_calibration_lookback_days: 252
  score_calibration_buckets: 10
  score_calibration_min_total_obs: 5000
  score_calibration_min_bucket_obs: 100
  rolling_train_days: 378
  validation_mode: "frozen"
  selection_method: "regime_stepwise"
  selection_top_n: 8
  use_regime: true
  regime_lag_days: 1
  selection_refit_days: 63
  selection_window_days: 378
  soft_regime_weights: true
  soft_regime_min_weight: 0.01
  soft_regime_min_eff_n: 50
  selection_use_soft_regime: true
  regime_factor_family_map_path: "config/factor_family_map.yaml"
  regime_family_prior_strength: 0.10
  thin_regime_family_prior_strength: 0.30
  thin_regime_eff_n_threshold: 50
  thin_regime_top_n: 4
  regime_family_priors:
    regime_0:
      trend: 0.20
      quality_defensive: 0.15
      short_reversal: -0.05
      volatility_stress: -0.10
    regime_1:
      trend: 0.15
      liquidity_turnover: 0.10
      residual_cross_section: 0.05
      volatility_stress: -0.05
    regime_2:
      quality_defensive: 0.20
      short_reversal: 0.15
      volatility_stress: 0.15
      trend: -0.05
    regime_3:
      quality_defensive: 0.25
      volatility_stress: 0.25
      liquidity_turnover: 0.15
      trend: -0.15
  factor_lag: 1
  ic_decay_half_life_days: 60
  lstm_lookback: 20
  lstm_hidden_size: 32
  lstm_num_layers: 1
  lstm_dropout: 0.0
  lstm_epochs: 5
  lstm_batch_size: 256
  lstm_lr: 0.001

backtest:
  long_short: false
  top_q: 0.04
  bottom_q: 0.0
  holding_period: 5
  rebalance_freq: 5
  cost_bps: 0.0
  initial_capital: 1000000.0
  max_weight: 0.5
  signal_lag: 1
  score_norm: "zscore"
  portfolio_method: "diag_mv"
  optimizer_alpha_method: "rank_normal"
  spo_cov_window: 60
  spo_risk_aversion: 5.0
  spo_cov_shrinkage: 0.2
  robust_window: 60
  robust_uncertainty_k: 0.1
  robust_lambda_l2: 0.05
  robust_turnover_mult: 0.0
  robust_turnover_cap: 0.4
  robust_penalty_scale: "score_std"
  robust_max_leverage: 1.0
  robust_min_leverage: 0.0
  robust_target_leverage: null
  robust_breadth_n: 20
  stress_costs_bps: [0]
  stress_short_fee_bps: [0]
